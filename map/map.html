<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>map</title>
    <link rel="stylesheet" href="../assets/css/reset/reset.min.css">
    <link rel="stylesheet" href="../assets/css/common/common.css">
    <link rel="stylesheet" href="./map.css">
</head>

<body>

    <main>

        <section class="map-section">
            <div class="bg"></div>
            <div class="map-container">
                <img src="./images/map-img.png" class="map-img" />

                <div class="map-point point-1">
                    <img src="./images/icon-pin.png" class="pin" />

                    <div class="info-box">
                        <p class="title">그레이트 블루홀</p>
                        <p class="subtitle">
                            카리브해, 벨리즈<br>
                            세계에서 가장 아름다운 블루홀
                        </p>
                        <button class="more-btn">
                            <img src="./images/icon-aroow-r.png" />
                        </button>
                    </div>
                </div>

                <div class="map-point point-2">
                    <img src="./images/icon-pin.png" class="pin" />

                    <div class="info-box">
                        <p class="title">샤크, 욜란다 리프</p>
                        <p class="subtitle">
                            홍해, 이집트<br>
                            화려한 산호정원과 수직 절벽
                        </p>
                        <button class="more-btn">
                            <img src="./images/icon-aroow-r.png" />
                        </button>
                    </div>
                </div>

                <div class="map-point point-3">
                    <img src="./images/icon-pin.png" class="pin" />

                    <div class="info-box">
                        <p class="title">블루코너</p>
                        <p class="subtitle">
                            서태평양, 팔라우<br>
                            야생의 역동적인 생동감, 상어의 군무
                        </p>
                        <button class="more-btn">
                            <img src="./images/icon-aroow-r.png" />
                        </button>
                    </div>
                </div>

            </div>
        </section>

    </main>

</body>

</html>
